stages:
  - build-prod
  - test
  - upload-to-invai-back
  - update-client-repo

cache:
  paths:
    - node_modules/

#############################
#    BUILD PROD             #
#  Compila la app localizada #
#  (ca+es) en la rama develop #
#############################
build-prod:
  stage: build-prod
  tags:
    - node24-bookworm
  script:
    - npm install
    - rm -rf dist
    - npm run build:i18n
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  artifacts:
    paths:
      - dist

