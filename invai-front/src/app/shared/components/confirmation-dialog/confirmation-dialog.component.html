<p-dialog
  [(visible)]="visible"
  [closable]="true"
  [closeOnEscape]="true"
  [dismissableMask]="true"
  [draggable]="false"
  [modal]="true"
  [resizable]="false"
  [style]="{ width: '24rem', maxWidth: 'calc(100vw - 2rem)' }"
  (onHide)="onHide()"
>
  <ng-template #header>
    <h2 class="m-0 text-base font-semibold text-color">{{ title() }}</h2>
  </ng-template>

  <div class="flex items-start gap-3 text-sm leading-5 text-color-secondary">
    <i class="mt-1 text-color-secondary" [class]="PrimeIcons.EXCLAMATION_TRIANGLE" aria-hidden="true"></i>
    <p class="m-0 whitespace-pre-line">{{ message() }}</p>
  </div>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button
        [ariaLabel]="cancelAriaLabel()"
        [label]="cancelLabel()"
        [text]="true"
        severity="secondary"
        (onClick)="onCancel()"
      />
      <p-button
        [ariaLabel]="confirmAriaLabel()"
        [icon]="confirmIcon()"
        [label]="confirmLabel()"
        [outlined]="true"
        [severity]="severity()"
        (onClick)="onConfirm()"
      />
    </div>
  </ng-template>
</p-dialog>
