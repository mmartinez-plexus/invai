<div class="flex flex-col h-screen overflow-hidden">
  <header
    class="flex h-[4.5rem] shrink-0 items-center border-b border-slate-200 bg-white px-6 shadow-xs"
  >
    <ng-content select="[header-left]" />

    <app-top-menu class="min-w-0 flex-1 overflow-x-auto px-4" />

    <ng-content select="[header-right]" />
  </header>

  <section class="flex flex-1 min-h-0 overflow-hidden">
    <app-sidebar
      class="relative flex flex-col shrink-0 overflow-visible border-r border-slate-200"
    />

    <main class="w-full min-h-0 flex justify-center overflow-y-auto surface-100">
      <ng-content />
    </main>
  </section>
</div>
